{% extends "common/base.html" %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="card-title">Upload Dataset</h1>
        <p class="text-muted">Upload a CSV file to begin metadata extraction and governance tracking.</p>
        <form method="post" enctype="multipart/form-data" class="mt-4">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_name" class="form-label">Dataset name</label>
                <input type="text" class="form-control" id="id_name" name="name" placeholder="Enter dataset name" value="{{ request.POST.name }}">
            </div>
            <div class="mb-3">
                <label for="id_file" class="form-label">Dataset file</label>
                <input type="file" class="form-control" id="id_file" name="file" accept=".csv,.json">
            </div>
            <button type="submit" class="btn btn-primary">Upload dataset</button>
        </form>
    </div>
</div>
{% endblock %}
