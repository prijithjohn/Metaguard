version: '3.9'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metaguard}
      POSTGRES_USER: ${POSTGRES_USER:-metaguard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metaguard_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metaguard_user} -d ${POSTGRES_DB:-metaguard} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn metaguard_project.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app:cached
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_ENGINE=django.db.backends.postgresql
      - POSTGRES_DB=${POSTGRES_DB:-metaguard}
      - POSTGRES_USER=${POSTGRES_USER:-metaguard_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-metaguard_pass}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  worker:
    build: .
    command: celery -A metaguard_project worker --loglevel=info --concurrency=2
    volumes:
      - .:/app:cached
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_ENGINE=django.db.backends.postgresql
      - POSTGRES_DB=${POSTGRES_DB:-metaguard}
      - POSTGRES_USER=${POSTGRES_USER:-metaguard_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-metaguard_pass}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata: